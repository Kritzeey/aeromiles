<header class="fixed w-full top-0 z-50 bg-blue-900 text-white">
  <nav class="max-w-6xl mx-auto h-12 flex items-center justify-between">
    <a class="font-medium" href="{% url 'main:home' %}">AeroMiles</a>

    <div class="flex items-center gap-3 text-sm">
      {% if request.session.user_email %}
      <span>{{ request.session.user_email }}</span>
      {% else %}
      <a
        href="{% url 'authentication:login' %}"
        class="rounded-md px-3 py-1.5 hover:bg-blue-800"
      >
        Login
      </a>
      <a
        href="{% url 'authentication:register' %}"
        class="rounded-md bg-white px-3 py-1.5 font-medium text-blue-900 hover:bg-blue-50"
      >
        Register
      </a>
      {% endif %}
    </div>
  </nav>
</header>
