{% extends "base.html" %}

{% block title %}Register | AeroMiles{% endblock %}

{%block content %}
<section class="flex h-dvh items-center justify-center px-6 py-10">
  <div class="w-full max-w-2xl rounded-lg bg-white p-8 shadow-sm">
    <h1 class="text-2xl font-semibold text-blue-900">Register</h1>
    <p class="mt-2 text-sm">Create your AeroMiles account.</p>

    <form method="post" class="mt-6 grid gap-4 md:grid-cols-2">
      {% csrf_token %}

      <div class="md:col-span-2">
        <label for="email" class="block text-sm font-medium">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          maxlength="100"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        />
      </div>

      <div class="md:col-span-2">
        <label for="password" class="block text-sm font-medium">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          maxlength="255"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        />
      </div>

      <div>
        <label for="salutation" class="block text-sm font-medium"
          >Salutation</label
        >
        <select
          id="salutation"
          name="salutation"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        >
          <option value="">Select salutation</option>
          <option value="Mr.">Mr.</option>
          <option value="Mrs.">Mrs.</option>
          <option value="Ms.">Ms.</option>
          <option value="Dr.">Dr.</option>
        </select>
      </div>

      <div>
        <label for="tanggal_lahir" class="block text-sm font-medium"
          >Birth Date</label
        >
        <input
          id="tanggal_lahir"
          name="tanggal_lahir"
          type="date"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        />
      </div>

      <div>
        <label for="first_mid_name" class="block text-sm font-medium"
          >First/Middle Name</label
        >
        <input
          id="first_mid_name"
          name="first_mid_name"
          type="text"
          maxlength="100"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        />
      </div>

      <div>
        <label for="last_name" class="block text-sm font-medium"
          >Last Name</label
        >
        <input
          id="last_name"
          name="last_name"
          type="text"
          maxlength="100"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        />
      </div>

      <div>
        <label for="country_code" class="block text-sm font-medium"
          >Country Code</label
        >
        <input
          id="country_code"
          name="country_code"
          type="text"
          maxlength="5"
          placeholder="+62"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        />
      </div>

      <div>
        <label for="mobile_number" class="block text-sm font-medium"
          >Mobile Number</label
        >
        <input
          id="mobile_number"
          name="mobile_number"
          type="tel"
          maxlength="20"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        />
      </div>
      <div>
        <label for="kewarganegaraan" class="block text-sm font-medium"
          >Nationality</label
        >
        <input
          id="kewarganegaraan"
          name="kewarganegaraan"
          type="text"
          maxlength="50"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        />
      </div>

      <div class="md:col-span-2">
        <button
          type="submit"
          class="w-full rounded-md bg-blue-900 px-4 py-2 font-medium text-white hover:bg-blue-800"
        >
          Register
        </button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
