{% extends "base.html" %}

{% block title %}Login | AeroMiles{% endblock %}

{%block content %}
<section class="flex h-dvh items-center justify-center px-6">
  <div class="w-full max-w-md rounded-lg bg-white p-8 shadow-sm">
    <h1 class="text-2xl font-semibold text-blue-900">Login</h1>

    <p class="mt-2 text-sm">Access your AeroMiles account.</p>

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}

      <div>
        <label for="email" class="block text-sm font-medium">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          required
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-blue-700"
        />
      </div>

      <button
        type="submit"
        class="w-full rounded-md bg-blue-900 px-4 py-2 font-medium text-white hover:bg-blue-800"
      >
        Login
      </button>
    </form>
  </div>
</section>
{% endblock %}
